<!DOCTYPE html>
<html lang="et">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SAN — The Art of Restoration</title>
  <meta name="robots" content="noindex, nofollow" />
  <style>
    :root{--bg:#f3f1eb;--card:rgba(252,251,247,.92);--line:#ddd8ce;--text:#262626;--muted:#6d6d6d;--soft:#ebe7de;--accent:#1f1f1f}
    *{box-sizing:border-box} body{margin:0;background:radial-gradient(circle at top,#faf8f3 0%,var(--bg) 60%);color:var(--text);font-family:Georgia,"Times New Roman",serif}
    .wrap{max-width:820px;margin:0 auto;padding:28px 18px 110px}
    .hero,.card{background:var(--card);border:1px solid var(--line);border-radius:30px;padding:24px;box-shadow:0 10px 30px rgba(0,0,0,.04);margin-bottom:14px}
    .hero{text-align:center}.logo{width:120px;display:block;margin:0 auto 16px auto;opacity:.95}
    h1,h2,h3,p{margin:0} h1{font-size:34px;letter-spacing:.24em;font-weight:400}
    .tag{margin-top:8px;font-size:12px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase}
    .lead{max-width:560px;margin:24px auto 0 auto;line-height:1.9;color:#4c4c4c;font-size:17px}
    .field{border:1px solid #e8e3d8;background:rgba(255,255,255,.75);border-radius:22px;padding:16px 18px}
    textarea{width:100%;min-height:180px;background:transparent;border:none;resize:vertical;color:var(--text);font:16px/1.9 Georgia,serif;outline:none}
    .hint{margin-top:12px;color:var(--muted);font-size:13px;line-height:1.7}
    .btnrow{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}
    button{font:15px Georgia,serif;border:none;border-radius:18px;padding:14px 18px;cursor:pointer}
    .primary{background:var(--accent);color:white;flex:1}.ghost{background:transparent;border:1px solid var(--line);color:var(--text)} .softbtn{background:#f7f4ee;border:1px solid var(--line);color:var(--text)}
    .qtext{font-size:23px;line-height:1.6;margin:22px 0 12px 0}.options{display:grid;gap:10px;margin-top:16px}
    .option{padding:15px 16px;background:white;border:1px solid var(--line);border-radius:20px;text-align:left}
    .smallmuted{color:var(--muted);font-size:13px;line-height:1.7}.list{display:grid;gap:8px}.list div{padding:10px 12px;border-radius:14px;background:#faf8f3;border:1px solid #ece6da;line-height:1.58}
    .grid{display:grid;grid-template-columns:1fr;gap:12px;margin-top:16px}.mini{background:white;border:1px solid var(--line);border-radius:24px;padding:18px}
    .pill{display:inline-block;padding:8px 11px;border-radius:999px;background:var(--soft);font-size:12px;color:#555}.row{display:flex;justify-content:space-between;gap:8px;align-items:center;flex-wrap:wrap}.status{margin-top:8px;color:var(--muted);font-size:13px}
    .audio-box{margin-top:14px;padding:14px;border:1px solid var(--line);border-radius:18px;background:#fbfaf6}
    .audio-row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    .audio-status{font-size:13px;color:var(--muted);margin-top:10px}
    @media (min-width:760px){ .grid{grid-template-columns:1fr 1fr} }
  </style>
</head>
<body>
  <div class="wrap" id="app"></div>
  <script>
    const state = { step:"intro", complaintText:"", qaHistory:[], currentQuestion:null, result:null, loading:false, recording:false, recognition:null, mediaRecorder:null, audioChunks:[], audioSupported:false, audioUploading:false };
    const logoSvg = `
    <svg class="logo" viewBox="0 0 180 180" xmlns="http://www.w3.org/2000/svg" aria-label="SAN">
      <path d="M48 45c10 20 22 46 24 82" fill="none" stroke="#222" stroke-width="10" stroke-linecap="round"/>
      <path d="M90 38c6 18 16 44 15 92" fill="none" stroke="#222" stroke-width="10" stroke-linecap="round"/>
      <path d="M130 46c-10 18-20 40-22 80" fill="none" stroke="#222" stroke-width="10" stroke-linecap="round"/>
    </svg>`;

    function escapeHtml(str){ return String(str||"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;"); }

    function render(){
      const app=document.getElementById("app");
      if(state.step==="intro"){
        app.innerHTML=`
          <div class="hero">
            ${logoSvg}
            <h1>SAN</h1>
            <div class="tag">The Art of Restoration</div>
            <p class="lead">Kirjelda vabalt, mis sinu kehas või elus hetkel toimub. Süsteem teeb esmase hüpoteesi ja liigub edasi viie täpsustava küsimusega.</p>
          </div>
          <div class="card">
            <div class="field"><textarea id="complaintText" placeholder="Räägi nii, nagu räägiksid arstile või iseendale. Mis on põhimure? Mis tunne on kehas? Mis mõjutab su enesetunnet?">${escapeHtml(state.complaintText)}</textarea></div>
            <div class="hint">Alusta vabalt. Süsteem otsib sinu jutust mustreid, mitte täiuslikke termineid.</div>
            <div class="btnrow">
              <button class="softbtn" onclick="toggleSpeech()">${state.recording ? "Peata dikteerimine" : "Brauseri dikteerimine"}</button>
              <button class="primary" onclick="startIntake()">Jätka</button>
            </div>
            <div class="audio-box">
              <div class="audio-row">
                <button class="softbtn" onclick="toggleAudioRecording()">${state.mediaRecorder && state.mediaRecorder.state === 'recording' ? "Peata salvestus" : "Salvesta audiofail"}</button>
                <button class="softbtn" onclick="uploadAudio()" ${state.audioUploading ? "disabled" : ""}>${state.audioUploading ? "Laen üles..." : "Lae audio üles ja teisenda tekstiks"}</button>
              </div>
              <div class="audio-status">
                Päris audio upload kasutab serveri transkriptsiooni endpointi. Kui su brauser toetab ainult dikteerimist, töötab ka see edasi.
              </div>
            </div>
            <div class="status">See versioon kasutab serveripoolset OpenAI API ühendust.</div>
          </div>`;
        hydrateText(); return;
      }
      if(state.loading){
        app.innerHTML=`
          <div class="hero">${logoSvg}<h1>SAN</h1><div class="tag">The Art of Restoration</div></div>
          <div class="card"><div class="row"><h2>Vaikne lugemine</h2><span class="pill">${Math.min(state.qaHistory.length+1,5)} / 5</span></div><div class="status">AI loeb kirjeldust ja valib järgmise kõige kasulikuma küsimuse.</div></div>`;
        return;
      }
      if(state.step==="question" && state.currentQuestion){
        app.innerHTML=`
          <div class="hero">${logoSvg}<h1>SAN</h1><div class="tag">The Art of Restoration</div></div>
          <div class="card">
            <div class="row"><h2>Täpsustamine</h2><span class="pill">${state.currentQuestion.questionNumber || (state.qaHistory.length+1)} / 5</span></div>
            <div class="qtext">${escapeHtml(state.currentQuestion.question)}</div>
            <div class="options">${(state.currentQuestion.options||[]).map(opt=>`<button class="option" onclick='submitAnswer(${JSON.stringify(opt)})'>${escapeHtml(opt)}</button>`).join("")}</div>
            <div class="status">${escapeHtml(state.currentQuestion.reasoningSummary || "")}</div>
          </div>`;
        return;
      }
      if(state.step==="result" && state.result){
        const r=state.result;
        app.innerHTML=`
          <div class="hero">${logoSvg}<h1>SAN</h1><div class="tag">The Art of Restoration</div></div>
          <div class="card">
            <div class="row"><h2>Suund</h2><span class="pill">${escapeHtml(r.confidence||"keskmine")} kindlus</span></div>
            <div style="font-size:30px;line-height:1.35;margin-top:10px">${escapeHtml(r.pattern)}</div>
            <div style="margin-top:18px;line-height:1.95;color:#434343;font-size:17px">${escapeHtml(r.interpretation||"")}</div>
            <div class="status">${escapeHtml(r.reasoningSummary||"")}</div>
          </div>
          <div class="grid">
            <div class="mini"><h3>Elustiil</h3><div class="list">${(r.lifestyle||[]).map(x=>`<div>${escapeHtml(x)}</div>`).join("")}</div></div>
            <div class="mini"><h3>Toit</h3><div class="list">${(r.food||[]).map(x=>`<div>${escapeHtml(x)}</div>`).join("")}</div></div>
            <div class="mini"><h3>Taimed</h3><div class="list">${(r.herbs||[]).map(x=>`<div>${escapeHtml(x)}</div>`).join("")}</div></div>
            <div class="mini"><h3>Punktid</h3><div class="list">${(r.points||[]).map(x=>`<div>${escapeHtml(x)}</div>`).join("")}</div></div>
          </div>
          <div class="card"><div class="smallmuted">Siin pakutakse ainult üht kõige vaiksemalt selgemat suunda.</div><div class="btnrow"><button class="ghost" onclick="restart()">Alusta uuesti</button></div></div>`;
      }
    }

    async function startIntake(){
      const textarea=document.getElementById("complaintText");
      state.complaintText = textarea ? textarea.value.trim() : state.complaintText;
      if(!state.complaintText){ alert("Palun kirjelda esmalt oma põhimure vabatekstina."); return; }
      await fetchNext();
    }
    async function submitAnswer(answer){ state.qaHistory.push({question: state.currentQuestion.question, answer}); await fetchNext(); }

    async function fetchNext(){
      state.loading=true; render();
      try{
        const res=await fetch("/api/intake", {method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({complaintText: state.complaintText, qaHistory: state.qaHistory})});
        const data=await res.json();
        state.loading=false;
        if(!res.ok) throw new Error(data.error || "API request failed");
        if(data.mode==="question"){ state.currentQuestion=data; state.step="question"; }
        else { state.result=data; state.step="result"; }
        render();
      }catch(err){ state.loading=false; alert("AI päring ebaõnnestus: " + err.message); render(); }
    }

    function hydrateText(){ const el=document.getElementById("complaintText"); if(el) el.value=state.complaintText || ""; }
    function restart(){ stopSpeech(); stopAudioRecording(); state.step="intro"; state.complaintText=""; state.qaHistory=[]; state.currentQuestion=null; state.result=null; state.loading=false; render(); }

    function setupSpeech(){
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if(!SpeechRecognition) return false;
      const recognition = new SpeechRecognition();
      recognition.lang="et-EE"; recognition.continuous=true; recognition.interimResults=true;
      recognition.onresult=(event)=>{ let text=""; for(let i=0;i<event.results.length;i++) text += event.results[i][0].transcript + " "; state.complaintText=text.trim(); hydrateText(); };
      recognition.onend=()=>{ state.recording=false; render(); hydrateText(); };
      state.recognition=recognition; return true;
    }
    function toggleSpeech(){
      if(!state.recognition && !setupSpeech()){ alert("Selles brauseris ei ole häälest sisestamine saadaval."); return; }
      if(state.recording) stopSpeech(); else { state.recording=true; state.recognition.start(); render(); hydrateText(); }
    }
    function stopSpeech(){ if(state.recognition && state.recording){ try{state.recognition.stop();}catch{} } state.recording=false; }

    async function toggleAudioRecording() {
      if (state.mediaRecorder && state.mediaRecorder.state === "recording") {
        stopAudioRecording();
        return;
      }
      if (!navigator.mediaDevices?.getUserMedia || !window.MediaRecorder) {
        alert("Selles brauseris ei ole audiofaili salvestamine saadaval.");
        return;
      }
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        state.audioChunks = [];
        state.mediaRecorder = new MediaRecorder(stream);
        state.mediaRecorder.ondataavailable = (e) => {
          if (e.data.size > 0) state.audioChunks.push(e.data);
        };
        state.mediaRecorder.onstop = () => {
          stream.getTracks().forEach(t => t.stop());
          render();
        };
        state.mediaRecorder.start();
        render();
      } catch (err) {
        alert("Audio salvestamist ei õnnestunud käivitada.");
      }
    }

    function stopAudioRecording() {
      if (state.mediaRecorder && state.mediaRecorder.state === "recording") {
        state.mediaRecorder.stop();
      }
    }

    async function uploadAudio() {
      if (!state.audioChunks || !state.audioChunks.length) {
        alert("Palun salvesta kõigepealt audio.");
        return;
      }
      state.audioUploading = true;
      render();
      try {
        const blob = new Blob(state.audioChunks, { type: state.audioChunks[0].type || "audio/webm" });
        const form = new FormData();
        form.append("audio", blob, "san-recording.webm");

        const res = await fetch("/api/transcribe", {
          method: "POST",
          body: form
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "Transcription failed");

        state.complaintText = [state.complaintText, data.text].filter(Boolean).join("\n");
        state.audioChunks = [];
        state.audioUploading = false;
        render();
        hydrateText();
      } catch (err) {
        state.audioUploading = false;
        render();
        alert("Audio transkriptsioon ebaõnnestus: " + err.message);
      }
    }

    render();
  </script>
</body>
</html>
